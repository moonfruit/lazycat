name: Tailscale
package: com.github.moonfruit.tailscale
version: 1.98.4
description: 将设备和用户接入你专属的安全虚拟专用网络（官方镜像 + OAuth 登录）。

application:
  subdomain: tailscale
  background_task: true
  routes:
    - /=http://web:5252/

services:
  # 直跑 tailscaled（不经 containerboot，避免无 authkey 时的 60s 启动死线）。
  # 仅 tailscaled 自身参数；tailscale CLI 配置交给 web 容器。
  tailscaled:
    image: tailscale/tailscale:v1.98.4
    network_mode: host
    netadmin: true
    entrypoint: ""
    command: "sh /lzcapp/pkg/content/tailscaled.sh"
    environment:
      # if/else 总是输出一项：既避免空值渲染 "<no value>"，又避免 environment 为空(解码器要求非空)。
      {{- if .U.ts_tailscaled_extra_args }}
      - TS_TAILSCALED_EXTRA_ARGS={{ .U.ts_tailscaled_extra_args }}
      {{- else }}
      - TS_TAILSCALED_EXTRA_ARGS=--port=0
      {{- end }}
    binds:
      - /lzcapp/var/data:/var/lib
      - /lzcapp/var/run:/var/run/tailscale
    healthcheck:
      test: ["CMD-SHELL", "test -S /var/run/tailscale/tailscaled.sock"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  # tailscale web 登录/管理 UI，并把 hostname/routes/extra 等 CLI 配置应用到共享守护进程。
  web:
    image: tailscale/tailscale:v1.98.4
    entrypoint: ""
    command: "sh /lzcapp/pkg/content/web.sh"
    environment:
      {{- if .U.ts_hostname }}
      - TS_HOSTNAME={{ .U.ts_hostname }}
      {{- else }}
      - TS_HOSTNAME={{ .S.BoxName }}
      {{- end }}
      {{- if .U.ts_routes }}
      - TS_ROUTES={{ .U.ts_routes }}
      {{- end }}
      {{- if .U.ts_extra_args }}
      - TS_EXTRA_ARGS={{ .U.ts_extra_args }}
      {{- else }}
      - TS_EXTRA_ARGS=--accept-routes
      {{- end }}
    binds:
      - /lzcapp/var/run:/var/run/tailscale
    depends_on:
      - tailscaled

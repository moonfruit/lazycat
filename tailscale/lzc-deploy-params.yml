params:
  - id: ts_hostname
    type: string
    name: Tailscale hostname
    default_value: "{{ .S.BoxName }}"
    description: "The hostname for this node on your tailnet."
    optional: true

  - id: ts_routes
    type: string
    name: Advertise subnet routes
    default_value: ""
    description: "Comma-separated CIDRs to advertise, e.g. 192.168.50.0/24. Must be approved in the Tailscale admin console."
    optional: true

  - id: ts_extra_args
    type: string
    name: tailscale set flags
    default_value: "--accept-routes"
    description: "Flags applied via `tailscale set` after login (e.g. --accept-routes, --ssh, --advertise-exit-node, --shields-up). Only `tailscale set` flags work here, not `tailscale up`-only flags. See https://tailscale.com/kb/1241/tailscale-set"
    optional: true

  - id: ts_tailscaled_extra_args
    type: string
    name: tailscaled extra args
    default_value: ""
    description: "Extra flags passed to `tailscaled`. Leave empty to use the default WireGuard port (41641); set --port=0 to pick a random one."
    optional: true

locales:
  zh:
    ts_hostname:
      name: "Tailscale 主机名"
      description: "本节点在 tailnet 上的主机名。"
    ts_routes:
      name: "广播子网路由"
      description: "以逗号分隔的 CIDR，如 192.168.50.0/24；需在 Tailscale 管理后台批准后生效。"
    ts_extra_args:
      name: "tailscale set 参数"
      description: "登录后经 `tailscale set` 应用的参数（如 --accept-routes、--ssh、--advertise-exit-node、--shields-up）。仅支持 `tailscale set` 的参数，不能用 `tailscale up` 专有参数。参考 https://tailscale.com/kb/1241/tailscale-set"
    ts_tailscaled_extra_args:
      name: "tailscaled 额外参数"
      description: "透传给 `tailscaled` 的参数。留空使用默认 WireGuard 端口（41641）；填 --port=0 则随机选端口。"
